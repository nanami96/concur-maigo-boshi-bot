name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Generate sample-company config
        run: npm run generate:config sample-company

      - name: Generate company-a config
        run: npm run generate:config company-a

      - name: Run tests
        run: npm test -- --run
