name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Generate sample-company config
        run: npm run generate:config sample-company

      - name: Run tests
        run: npm test -- --run

      - name: Build public demo
        run: npm run build
        env:
          VITE_PUBLIC_DEMO: "true"
          # Supabase Project URL / anon(publishable) keyのみ。ブラウザに公開される
          # ことを前提とした鍵であり、実際のアクセス制御はRLS・RPC権限側で行う
          # （src/lib/supabaseClient.js参照）。service_roleキーは絶対にここへ
          # 追加しないこと。値が未設定の場合はisSupabaseConfigured=falseとなり、
          # 従来通りローカル開発モード相当（静的configのみ）でビルドされる
          # （後続Phaseまでこれらのシークレットを登録していなくてもビルドは壊れない）。
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
